slides:
    monkey_fracas_jr_slide:
        widgets:
            - type: image
              image: monkey_fracas_title_bg
              z: 1
            - type: image
              image: video_mode_sectors_overlay
              z: 4
    monkey_fracas_jr_2nd_screen:
        widgets:
            - type: image
              image: monkey_fracas_jr_title
              z: 1
    good_game_over_slide:
        widgets:
            - type: image
              image: monkey_fracas_title_bg
              z: 1
            - type: text
              text: GAME OVER
              z: 3
              y: middle+30%
              font_name: pixelmix
              font_size: 100
              color: green
            - type: text
              text: "-Video Mode Final Score-"
              z: 3
              y: middle
              font_name: pixelmix
              font_size: 60
              color: white
            - type: text
              text: (player|mfj_score)
              z: 3
              y: middle-30%
              font_name: pixelmix
              font_size: 80
              color: white


