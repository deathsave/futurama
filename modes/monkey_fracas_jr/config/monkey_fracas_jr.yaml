#config_version=6
##! mode: monkey_fracas_jr

#this mode uses the following player variables:
#ship_vert_current
#ship_vert_moving
#good_laser1_vert -set based on ship_vert when fired
#good_laser1_pos -advanced by laserx_show
#good_laser1_status
#good_laser2_vert -set based on ship_vert when fired
#good_laser2_pos -advanced by laserx_show
#good_laser2_status
#good_laser3_vert -set based on ship_vert when fired
#good_laser3_pos -advanced by laserx_show
#good_laser3_status
#good_laser4_vert -set based on ship_vert when fired
#good_laser4_pos -advanced by laserx_show
#good_laser4_status
#bad_laser1
#bad_laser2
#bad_laser3
#enemy_vert
#enemy_horiz
#enemy_pos
#next_laser_variable
#mfj_score

mode:
    start_events: start_video_mode
    stop_events: end_video_mode
    events_when_started: start_display_show, mom_zapp_off, delivery_started
    events_when_stopped: restart_theme_music, mom_zapp_on, delivery_ended
    priority: 500

state_machines:
    good_laser1_state:
        persist_state: false
        starting_state: ready
        states:
            ready:
                label: Start state
                events_when_started: good_laser1_ready
            fired:
                events_when_started: good_laser1_fired
        transitions:
            - source: ready
              target: fired
              events: fire_good_laser1
            - source: fired
              target: ready
              events: reload_good_laser1
    good_laser2_state:
        persist_state: false
        starting_state: ready
        states:
            ready:
                label: Start state
                events_when_started: good_laser2_ready
            fired:
                events_when_started: good_laser2_fired
        transitions:
            - source: ready
              target: fired
              events: fire_good_laser2
            - source: fired
              target: ready
              events: reload_good_laser2
    good_laser3_state:
        persist_state: false
        starting_state: ready
        states:
            ready:
                label: Start state
                events_when_started: good_laser3_ready
            fired:
                events_when_started: good_laser3_fired
        transitions:
            - source: ready
              target: fired
              events: fire_good_laser3
            - source: fired
              target: ready
              events: reload_good_laser3
    good_laser4_state:
        persist_state: false
        starting_state: ready
        states:
            ready:
                label: Start state
                events_when_started: good_laser4_ready
            fired:
                events_when_started: good_laser4_fired
        transitions:
            - source: ready
              target: fired
              events: fire_good_laser4
            - source: fired
              target: ready
              events: reload_good_laser4
    next_laser:
        persist_state: false
        starting_state: good_laser1
        states:
            good_laser1:
                label: Start state
                events_when_started: next_laser1
            good_laser2:
                events_when_started: next_laser2
            good_laser3:
                events_when_started: next_laser3
            good_laser4:
                events_when_started: next_laser4
        transitions:
            - source: good_laser1
              target: good_laser2
              events: fire_good_laser1
            - source: good_laser2
              target: good_laser3
              events: fire_good_laser2
            - source: good_laser3
              target: good_laser4
              events: fire_good_laser3
            - source: good_laser4
              target: good_laser1
              events: fire_good_laser4
    laser_charge_level:
        persist_state: false
        starting_state: four
        states:
            four:
                label: Start state
                events_when_started: laser_charge4
            three:
                events_when_started: laser_charge3
            two:
                events_when_started: laser_charge2
            one:
                events_when_started: laser_charge1
            zero:
                events_when_started: laser_charge0
        transitions:
            - source: four
              target: three
              events: fire_good_laser1, fire_good_laser2, fire_good_laser3, fire_good_laser4
            - source: three
              target: two
              events: fire_good_laser1, fire_good_laser2, fire_good_laser3, fire_good_laser4
            - source: two
              target: one
              events: fire_good_laser1, fire_good_laser2, fire_good_laser3, fire_good_laser4
            - source: one
              target: zero
              events: fire_good_laser1, fire_good_laser2, fire_good_laser3, fire_good_laser4
            - source: zero
              target: one
              events: reload_good_laser1, reload_good_laser2, reload_good_laser3, reload_good_laser4
            - source: one
              target: two
              events: reload_good_laser1, reload_good_laser2, reload_good_laser3, reload_good_laser4
            - source: two
              target: three
              events: reload_good_laser1, reload_good_laser2, reload_good_laser3, reload_good_laser4
            - source: three
              target: four
              events: reload_good_laser1, reload_good_laser2, reload_good_laser3, reload_good_laser4

    ship_vert:
        persist_state: false
        starting_state: ship_vert_d
        states:
            ship_vert_d:
                label: Start state
                events_when_started: ship_to_vert_d
            ship_vert_a:
                events_when_started: ship_to_vert_a
            ship_vert_b:
                events_when_started: ship_to_vert_b
            ship_vert_c:
                events_when_started: ship_to_vert_c
            ship_vert_e:
                events_when_started: ship_to_vert_e
            ship_vert_f:
                events_when_started: ship_to_vert_f
            ship_vert_g:
                events_when_started: ship_to_vert_g
        transitions:
            - source: ship_vert_a
              target: ship_vert_b
              events: ship_down_hit
            - source: ship_vert_b
              target: ship_vert_c
              events: ship_down_hit
            - source: ship_vert_c
              target: ship_vert_d
              events: ship_down_hit
            - source: ship_vert_d
              target: ship_vert_e
              events: ship_down_hit
            - source: ship_vert_e
              target: ship_vert_f
              events: ship_down_hit
            - source: ship_vert_f
              target: ship_vert_g
              events: ship_down_hit
            - source: ship_vert_g
              target: ship_vert_f
              events: ship_up_hit
            - source: ship_vert_f
              target: ship_vert_e
              events: ship_up_hit
            - source: ship_vert_e
              target: ship_vert_d
              events: ship_up_hit
            - source: ship_vert_d
              target: ship_vert_c
              events: ship_up_hit
            - source: ship_vert_c
              target: ship_vert_b
              events: ship_up_hit
            - source: ship_vert_b
              target: ship_vert_a
              events: ship_up_hit

event_player:
#laser charge limits player to 4 lasers on the screen at a time
#pushing the right flipper button will request a laser
#a state machine tracks which laser to fire next, they each have their own show
#if there are already 4 lasers active on the screen, it does not but make a
#"wimpy" noise to remind the player they can't do that and it didn't work
    request_laser_hit{current_player.next_laser_variable=="good_laser1"}: request_laser1
    request_laser1{current_player.good_laser1_status=="ready"}: fire_good_laser1
    request_laser_hit{current_player.next_laser_variable=="good_laser2"}: request_laser2
    request_laser2{current_player.good_laser2_status=="ready"}: fire_good_laser2
    request_laser_hit{current_player.next_laser_variable=="good_laser3"}: request_laser3
    request_laser3{current_player.good_laser3_status=="ready"}: fire_good_laser3
    request_laser_hit{current_player.next_laser_variable=="good_laser4"}: request_laser4
    request_laser4{current_player.good_laser4_status=="ready"}: fire_good_laser4
    check_hits{current_player.enemy_vert==current_player.good_laser1_vert}: verify_laser1_hit
    verify_laser1_hit{current_player.enemy_horiz==current_player.good_laser1_pos}: enemy_hit
    check_hits{current_player.enemy_vert==current_player.good_laser2_vert}: verify_laser2_hit
    verify_laser2_hit{current_player.enemy_horiz==current_player.good_laser2_pos}: enemy_hit
    check_hits{current_player.enemy_vert==current_player.good_laser3_vert}: verify_laser3_hit
    verify_laser3_hit{current_player.enemy_horiz==current_player.good_laser3_pos}: enemy_hit
    check_hits{current_player.enemy_vert==current_player.good_laser4_vert}: verify_laser4_hit
    verify_laser4_hit{current_player.enemy_horiz==current_player.good_laser4_pos}: enemy_hit
    check_impacts_a{current_player.ship_vert_moving==a or current_player.ship_vert_current==a}:
        - impact_a
        - start_bad_game_over
    check_impacts_b{current_player.ship_vert_moving==b or current_player.ship_vert_current==b}:
        - impact_b
        - start_bad_game_over
    check_impacts_c{current_player.ship_vert_moving==c or current_player.ship_vert_current==c}:
        - impact_c
        - start_bad_game_over
    check_impacts_d{current_player.ship_vert_moving==d or current_player.ship_vert_current==d}:
        - impact_d
        - start_bad_game_over
    check_impacts_e{current_player.ship_vert_moving==e or current_player.ship_vert_current==e}:
        - impact_e
        - start_bad_game_over
    check_impacts_f{current_player.ship_vert_moving==f or current_player.ship_vert_current==f}:
        - impact_f
        - start_bad_game_over
    check_impacts_g{current_player.ship_vert_moving==g or current_player.ship_vert_current==g}:
        - impact_g
        - start_bad_game_over



